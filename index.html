<!DOCTYPE html>
<html>
<head>
<title>Jashwanth Portfolio</title>
<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(-45deg, #1e3c72, #2a5298, #000428, #004e92);
    background-size: 400% 400%;
    animation: gradient 10s ease infinite;
    color: white;
    text-align: center;
}

@keyframes gradient {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

h1 {
    margin-top: 100px;
    font-size: 40px;
}

.skills {
    margin-top: 40px;
}

.card {
    background: rgba(255,255,255,0.1);
    padding: 20px;
    margin: 15px;
    border-radius: 10px;
    display: inline-block;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.1);
}
</style>
</head>
<body>

<h1>MuleSoft Developer Portfolio</h1>
<p>Fresher | API & Integration Enthusiast</p>

<div class="skills">
<div class="card">MuleSoft</div>
<div class="card">DataWeave</div>
<div class="card">REST APIs</div>
<div class="card">SFTP</div>
<div class="card">RAML</div>
</div>
</body>
</html>
